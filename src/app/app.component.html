<main
  style="
    max-width: 600px;
    margin: 50px auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
  "
>
  <h1
    style="color: #333; font-size: 24px; font-weight: 600; margin-bottom: 24px; text-align: center"
  >
    Minhas Tarefas
  </h1>

  <div style="display: flex; gap: 12px; margin-bottom: 30px">
    <input
      [ngModel]="novoTitulo()"
      (ngModelChange)="novoTitulo.set($event)"
      placeholder="O que precisa ser feito?"
      style="
        flex: 1;
        padding: 14px 16px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
      "
    />
    <button
      (click)="adicionar()"
      style="
        padding: 14px 24px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      "
    >
      Adicionar
    </button>
  </div>

  <ul
    style="
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    "
  >
    @for (t of tarefas(); track t.id) {
      <li
        style="
          padding: 16px;
          background: #f8f9fa;
          border: 1px solid #f1f3f5;
          border-radius: 8px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          transition:
            transform 0.1s,
            box-shadow 0.1s;
        "
      >
        <div style="display: flex; align-items: center; gap: 12px">
          <span
            [style.text-decoration]="t.concluida ? 'line-through' : 'none'"
            [style.color]="t.concluida ? '#868e96' : '#212529'"
            style="font-size: 16px; font-weight: 400"
          >
            {{ t.titulo }}
          </span>
          <span
            [style.background]="t.concluida ? '#d3f9d8' : '#fff3cd'"
            [style.color]="t.concluida ? '#2b8a3e' : '#e67700'"
            style="padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600"
          >
            {{ t.concluida ? 'Concluída' : 'Pendente' }}
          </span>
        </div>

        <div style="display: flex; gap: 8px">
          @if (!t.concluida) {
            <button
              (click)="concluir(t.id)"
              style="
                padding: 8px 12px;
                background: #ebfbee;
                color: #2b8a3e;
                border: 1px solid #b2f2bb;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                transition: all 0.2s;
              "
            >
              ✓ Concluir
            </button>
          }
          <button
            (click)="deletar(t.id)"
            style="
              padding: 8px 12px;
              background: #fff5f5;
              color: #c92a2a;
              border: 1px solid #ffc9c9;
              border-radius: 6px;
              cursor: pointer;
              font-size: 14px;
              font-weight: 500;
              transition: all 0.2s;
            "
          >
            Deletar
          </button>
        </div>
      </li>
    } @empty {
      <li
        style="
          text-align: center;
          padding: 40px 20px;
          color: #adb5bd;
          font-size: 16px;
          background: #f8f9fa;
          border-radius: 8px;
        "
      >
        Nenhuma tarefa encontrada. Adicione uma nova tarefa acima.
      </li>
    }
  </ul>
</main>
